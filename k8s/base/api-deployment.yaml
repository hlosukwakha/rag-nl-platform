apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-nl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: api
          image: rag-nl-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: QDRANT_URL
              value: http://qdrant:6333
            - name: EMBEDDING_MODEL
              value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: rag-nl
spec:
  selector:
    app: rag-api
  ports:
    - port: 8000
      targetPort: 8000
